version: '3.8'
services:
  backend:
    build: ./backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    depends_on:
      - redis
    ports:
      - "8000:8000"
  worker:
    build: ./backend
    command: celery -A tasks worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    depends_on:
      - redis
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
